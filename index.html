<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Wochenplaner</title>
    <link rel="icon" href="cook.png" type="image/png">  

    <meta name="theme-color" content="#f1f4f9" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#181b20" media="(prefers-color-scheme: dark)">

    <style>
        body {
            /* WICHTIG: Damit der Inhalt nicht hinter der Statusleiste verschwindet */
            padding-top: env(safe-area-inset-top);
            
            /* Damit keine weißen Ränder entstehen */
            margin: 0;
            
            /* Deine Farben (falls du Variablen nutzt, sonst nimm den Hex-Code) */
            background-color: var(--bg-color, var(--bg)); 
        }
    </style>
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="cook.png">

    <script type="module">


        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, getDoc, collection, query, orderBy, deleteDoc, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // 1. Firebase Konfiguration
        const firebaseConfig = {
            apiKey: "AIzaSyCdK5VgOqwS2qZCcL0dzjEX6l21YxTkDM8",
            authDomain: "wochenplan-957ec.firebaseapp.com",
            projectId: "wochenplan-957ec",
            storageBucket: "wochenplan-957ec.firebasestorage.app",
            messagingSenderId: "662198750456",
            appId: "1:662198750456:web:31d9a7f2f6e21efa7f7f0d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.db = db;
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // Nur kurzzeitig zum Wiederherstellen einfügen:
        window.restoreHelper = { doc, setDoc, db };

        // --- THEME LOGIK (DARK MODE) --- 📱'☀️' : '🌙';⚡
        window.toggleTheme = () => {
            const isDark = document.body.classList.toggle('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            document.getElementById('themeToggleBtn').innerText = isDark ? '⚡' : '⚡';

            // NEU: Den Menüplan sofort mit den neuen Farben (Schwarz vs. Pastell) neu rendern
            if (typeof renderStorage === 'function') {
                renderStorage(calculateCounts());
            }
        };

        function initTheme() {
            const savedTheme = localStorage.getItem('theme');
            // Prüfe System-Design
            const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
            
            if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
                document.body.classList.add('dark-mode');
                document.getElementById('themeToggleBtn').innerText = '⚡';
            } else {
                document.body.classList.remove('dark-mode');
                document.getElementById('themeToggleBtn').innerText = '⚡';
            }
        }

        // --- TAG CONFIGURATION ---
        const TAGS = {
            "schnell": { label: "Schnell", icon: "⚡" },
            "aufwändig": { label: "Aufwändig", icon: "🕰️" },
            "Reis": { label: "Reis", icon: "🍚" },
            "Nudeln": { label: "Nudeln", icon: "🍝" },
            "Fisch": { label: "Fisch", icon: "🐟" },
            "Fleisch": { label: "Fleisch", icon: "🥩" },
            "Kartoffel": { label: "Kartoffel", icon: "🥔" },
            "Milch": { label: "Milch", icon: "🥛" },
            "Salat": { label: "Salat", icon: "🥗" },
            "Teiggericht": { label: "Teiggericht", icon: "🌾" },
            "Suppe": { label: "Suppe", icon: "🍲" },
            "vegetarisch": { label: "Veggie", icon: "🥕" },
            "Brot": { label: "Brot", icon: "🍞" },
            "Favorit": { label: "Favorit", icon: "⭐" }
        };
        let activeTagFilters = [];

        onAuthStateChanged(auth, (user) => {
            const loginSection = document.getElementById('loginSection');
            const appSection = document.getElementById('appSection');
            if (user) {
                loginSection.style.display = "none";
                appSection.style.display = "block";
                setupRealtimeSync(); 
            } else {
                loginSection.style.display = "flex";
                appSection.style.display = "none";
            }
        });

        window.startLogin = () => {
            signInWithPopup(auth, provider).catch(error => {
                if (error.code === 'auth/popup-blocked') {
                    alert("Das Pop-up wurde blockiert.");
                } else {
                    alert("Fehler: " + error.message);
                }
            });
        };

        const daysFull = ["Montag", "Dienstag", "Mittwoch", "Donnerstag", "Freitag", "Samstag", "Sonntag"];
        let currentWeekIndex = 0;
        let selectedDayKey = null;
        let isEditMode = false;
        let planData = {};
        let speisekammerData = [];
        const kwLabels = [];
        const baseDate = new Date(2026, 0, 12); 

        // --- USER & METADATA LOGIK ---
        const USER_MAP = {
            "junkerhendrik@googlemail.com": "Hendrik",
            "jhe3ho@bosch.com": "Hendrik",
            "20jbard21@gmail.com": "Julia"
        };

        // Speichert ab, dass gerade jemand etwas geändert hat
        window.trackEdit = async () => {
            if (!auth.currentUser) return;
            try {
                await setDoc(doc(db, "planung", "metadata"), {
                    lastEditBy: auth.currentUser.email,
                    lastEditTime: Date.now()
                }, { merge: true });
            } catch (e) {
                console.error("Fehler beim Speichern der Metadaten:", e);
            }
        };

        // Variable zum Speichern des aktuellen Zeitstempels der Änderung
        let lastKnownEditTime = 0;

        // Die Funktion zum Öffnen des Pop-ups und Ausblenden des Punkts
        window.toggleLastEditPopup = (event) => {
            event.stopPropagation();
            const popup = document.getElementById('lastEditPopup');
            const dot = document.getElementById('notificationDot');

            if (popup.style.display === 'none') {
                popup.style.display = 'block';
                
                // Markiere als gelesen: Speichere den aktuellen Zeitstempel lokal im Browser
                localStorage.setItem('lastReadEdit', lastKnownEditTime.toString());
                
                // Punkt sofort ausblenden
                dot.style.display = 'none';

                document.addEventListener('click', function closePopup() {
                    popup.style.display = 'none';
                    document.removeEventListener('click', closePopup);
                });
            } else {
                popup.style.display = 'none';
            }
        };

        // --- CORE FUNKTIONEN ---
        window.toggleEditMode = () => {
            isEditMode = document.getElementById('editToggle').checked;
            document.body.classList.toggle('edit-mode', isEditMode);
            if(!isEditMode) {
                document.querySelectorAll('.day-card').forEach(c => c.classList.remove('active'));
                selectedDayKey = null;
            }
        };

        window.moveSlider = (dir) => {
            currentWeekIndex += dir;
            if (currentWeekIndex < 0) currentWeekIndex = 0;
            if (currentWeekIndex > 51) currentWeekIndex = 51;
            document.getElementById('weekWrapper').style.transform = `translateX(-${currentWeekIndex * 100}%)`;
            updateKWDisplay();
        };

        function updateKWDisplay() {
            document.getElementById('kwDisplay').innerText = kwLabels[currentWeekIndex];
            document.getElementById('prevBtn').disabled = currentWeekIndex === 0;
            document.getElementById('nextBtn').disabled = currentWeekIndex === 51;

            // NEU: Einkaufsliste auf dem Desktop beim Wochenwechsel automatisch aktualisieren
            if (window.innerWidth >= 1024 && window.showShoppingList) {
                window.showShoppingList();
            }
        }

        window.renderCalendar = () => {
            Object.keys(planData).forEach(key => {
                const data = planData[key];
                let mealName = "---";
                let chef = null;

                if (data) {
                    if (typeof data === 'object') {
                        // NEU: Priorisiere die mealId, falls vorhanden
                        if (data.mealId) {
                            const mealObj = speisekammerData.find(m => m.id === data.mealId);
                            mealName = mealObj ? mealObj.name : (data.meal || "Gelöscht");
                        } else {
                            mealName = data.meal || "---"; // Fallback für alte Einträge
                        }
                        chef = data.chef;
                    } else {
                        mealName = data; // Fallback für GANZ alte Einträge (nur Text)
                    }
                }
                
                const el = document.getElementById(`text-${key}`);
                const card = document.getElementById(`card-${key}`);
                if (el) el.innerText = mealName;
                if (card) {
                    card.classList.remove('chef-j', 'chef-h');
                    if (chef === 'J') card.classList.add('chef-j');
                    if (chef === 'H') card.classList.add('chef-h');
                }
            });
        };

        function setupRealtimeSync() {
            onSnapshot(doc(db, "planung", "wochenplan2026"), (ds) => {
                if (ds.exists()) {
                    planData = ds.data();
                    
                    window.renderCalendar(); // UI aktualisieren
                    renderStorage(calculateCounts());

                    if (window.generateShoppingList) {
                        const filterArg = activeShopFilter === 'all' ? null : activeShopFilter;
                        window.generateShoppingList(filterArg, true);
                    }
                }
            });

            onSnapshot(query(collection(db, "speisekammer"), orderBy("name")), (snapshot) => {
                speisekammerData = [];
                snapshot.forEach((doc) => {
                    speisekammerData.push({ id: doc.id, ...doc.data() });
                });
                
                window.renderCalendar(); 
                renderStorage(calculateCounts());

                // NEU: Einkaufsliste auch hier aktualisieren, da sie nun zwingend 
                // die Speisekammer-Daten (IDs) benötigt, um richtig zu laden!
                if (window.generateShoppingList) {
                    const filterArg = activeShopFilter === 'all' ? null : activeShopFilter;
                    window.generateShoppingList(filterArg, true);
                }
            });

            // --- Der angepasste Listener ---
            onSnapshot(doc(db, "planung", "metadata"), (ds) => {
                if (ds.exists()) {
                    const data = ds.data();
                    if (data.lastEditTime && data.lastEditBy) {
                        lastKnownEditTime = data.lastEditTime; // Global speichern für toggle-Funktion
                        
                        const name = USER_MAP[data.lastEditBy] || "Jemand";
                        const editDate = new Date(data.lastEditTime);
                        
                        // Formatierung
                        const dayNames = ["So", "Mo", "Di", "Mi", "Do", "Fr", "Sa"];
                        const dayStr = dayNames[editDate.getDay()];
                        const timeStr = editDate.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });

                        document.getElementById('lastEditPopup').innerText = `zuletzt bearbeitet von: ${name} (${dayStr}. ${timeStr} Uhr)`;

                        // LOGIK FÜR DEN PUNKT:
                        const lastRead = localStorage.getItem('lastReadEdit') || 0;
                        const now = Date.now();
                        const hoursDiff = (now - data.lastEditTime) / (1000 * 60 * 60);

                        if (hoursDiff <= 24 && data.lastEditTime > parseInt(lastRead)) {
                            document.getElementById('notificationDot').style.display = 'inline-block';
                        } else {
                            document.getElementById('notificationDot').style.display = 'none';
                        }
                    }
                }
            });
        }

        function calculateCounts() {
            const counts = {};
            Object.values(planData).forEach(val => {
                let id = null;
                let name = null;
                
                if (val && typeof val === 'object') {
                    id = val.mealId;
                    name = val.meal;
                } else {
                    name = val;
                }

                // Wir zählen primär über die ID
                if (id) {
                    counts[id] = (counts[id] || 0) + 1;
                } else if (name && name !== "---") {
                    // Abwärtskompatibilität: Falls keine ID da ist, suche die ID über den Namen
                    const found = speisekammerData.find(m => m.name === name);
                    if (found) {
                        counts[found.id] = (counts[found.id] || 0) + 1;
                    }
                }
            });
            return counts;
        }

        function getHeatStyle(count, min, max, mealName) {
            const isDarkMode = document.body.classList.contains('dark-mode');

            if (mealName === "---") {
                return "background-color: var(--ph-bg); border-color: var(--ph-border); color: var(--ph-color);";
            }

            let bg, border, textColor;
            
            // Farbberechnung (wie gehabt)
            if (count === 0) {
                bg = "#f0fdf4"; // hellgrün
                border = "#bbf7d0";
            } else if (max === min) {
                bg = "#fef9c3"; // gelb
                border = "#fde047";
            } else {
                const ratio = (count - min) / (max - min);
                const hue = 100 - (ratio * 100); 
                bg = `hsl(${hue}, 80%, 92%)`;
                border = `hsl(${hue}, 70%, 75%)`;
            }

            // Unterscheidung nach Modus
            if (isDarkMode) {
                // DARK MODE: Hintergrund immer schwarz, Rahmen farbig
                return `background-color: #1e293b !important; border-color: ${border} !important; color: #e2e8f0 !important;`;
            } else {
                // LIGHT MODE: Alles wie im Original
                return `background-color: ${bg} !important; border-color: ${border} !important; color: #0f172a !important;`;
            }
        }

        async function renderStorage(counts) {
            const storageEl = document.getElementById('mealStorage');
            if (!storageEl) return;

            const totalMeals = speisekammerData.length;
            const storageHeader = document.querySelector('.storage-section h3');
            if (storageHeader) {
                storageHeader.innerText = `🍴 Menüplan (${totalMeals - 1})`;
            }

            let lastCookedTimestamp = {};
            const now = new Date();
            now.setHours(0, 0, 0, 0);

            Object.keys(planData).forEach(key => {
                const data = planData[key];
                let mealId = null;
                let mealName = null;

                if (data && typeof data === 'object') {
                    mealId = data.mealId;
                    mealName = data.meal;
                } else {
                    mealName = data;
                }

                // Fallback für alte Einträge
                if (!mealId && mealName && mealName !== "---") {
                    const found = speisekammerData.find(m => m.name === mealName);
                    if (found) mealId = found.id;
                }

                if (mealId) {
                    const parts = key.split('-');
                    if (parts.length === 3) {
                        const kwNum = parseInt(parts[1].replace('KW', ''));
                        const dayIdx = daysFull.indexOf(parts[2]);
                        
                        let planDay = new Date(baseDate); 
                        planDay.setDate(baseDate.getDate() + ((kwNum - 3) * 7) + dayIdx);
                        planDay.setHours(0, 0, 0, 0);

                        if (planDay <= now) {
                            const ts = planDay.getTime();
                            if (!lastCookedTimestamp[mealId] || ts > lastCookedTimestamp[mealId]) {
                                lastCookedTimestamp[mealId] = ts; // Speichern über ID!
                            }
                        }
                    }
                }
            });

            // Zähle über die ID
            const countValues = speisekammerData.filter(i => i.name !== "---").map(i => counts[i.id] || 0);
            const minCount = countValues.length > 0 ? Math.min(...countValues) : 0;
            const maxCount = countValues.length > 0 ? Math.max(...countValues) : 0;

            storageEl.innerHTML = "";
            renderTagFilters();

            speisekammerData.forEach((item) => {
                const count = counts[item.id] || 0; // Zähle über die ID!
                const dynamicStyle = getHeatStyle(count, minCount, maxCount, item.name);
                
                let statusText = item.name === "---" ? "Platzhalter" : (count > 0 ? `${count}x geplant` : 'neu');
                
                let timeLabel = "";
                if (lastCookedTimestamp[item.id]) { // Abruf über ID!
                    const diffDays = Math.round((now.getTime() - lastCookedTimestamp[item.id]) / (1000 * 60 * 60 * 24));
                    if (diffDays === 0) {
                        timeLabel = "heute";
                    } else if (diffDays < 7) {
                        timeLabel = `vor ${diffDays} Tag${diffDays > 1 ? 'en' : ''}`;
                    } else {
                        const weeks = Math.floor(diffDays / 7);
                        timeLabel = `vor ${weeks} Woche${weeks > 1 ? 'n' : ''}`;
                    }
                }

                const fullSubtitle = (timeLabel && item.name !== "---") ? `${statusText} | zuletzt: ${timeLabel}` : statusText;
                const tagStringForDataAttr = Array.isArray(item.tags) ? item.tags.join(',') : '';

                storageEl.innerHTML += `
                    <div class="meal-item" 
                        style="${dynamicStyle}" 
                        onclick="handleMealClick('${item.id}', '${item.name}')"
                        data-tags="${tagStringForDataAttr}">
                        <span style="display:block; width:100%">${item.name}</span>
                        <small style="margin-top:2px; opacity:0.7; font-size:0.65rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">
                            ${fullSubtitle}
                        </small>
                    </div>`;
            });

            storageEl.innerHTML += `<div class="meal-item add-meal-btn" onclick="addNewMeal()">+ Gericht hinzufügen</div>`;
            window.filterMeals();
        }

        function renderTagFilters() {
            const container = document.getElementById('tagFilterContainer');
            if(!container) return;
            
            let html = `<button class="filter-tag ${activeTagFilters.length === 0 ? 'active' : ''}" 
                        onclick="window.setTagFilter(null)">Tags: Alle</button>`;
            
            Object.keys(TAGS).forEach(key => {
                const isActive = activeTagFilters.includes(key);
                const tag = TAGS[key];

                html += `
                    <button 
                        class="filter-tag ${isActive ? 'active' : ''}" 
                        onclick="window.setTagFilter('${key}')" 
                        title="${tag.label}"
                        aria-label="${tag.label}">
                        ${tag.icon}
                    </button>`;
            });
            
            container.innerHTML = html;
        }

        window.setTagFilter = (key) => {
            if (key === null) {
                activeTagFilters = []; 
            } else {
                if (activeTagFilters.includes(key)) {
                    activeTagFilters = activeTagFilters.filter(t => t !== key);
                } else {
                    activeTagFilters.push(key);
                }
            }
            renderTagFilters();
            window.filterMeals(); 
        };

        window.addNewMeal = async () => {
            const name = prompt("Name des neuen Gerichts:");
            if (name) {
                const newId = "m_" + Date.now();
                await setDoc(doc(db, "speisekammer", newId), { name: name, tags: [] });
                await window.trackEdit(); 
            }
        };

        window.handleMealClick = async (mealId, mealName) => {
            if (isEditMode) {
                window.assignMeal(mealId, mealName); // ID wird nun übergeben!
            } else {
                window.openRecipePopup(mealId, mealName);
            }
        };

        window.assignMeal = async (mealId, mealName) => {
            if (!selectedDayKey || !isEditMode) return;
            
            const currentData = planData[selectedDayKey] || {};
            let currentChef = (typeof currentData === 'object') ? currentData.chef : null;

            planData[selectedDayKey] = { 
                mealId: mealId || null,
                meal: mealName || "---", 
                chef: currentChef || null 
            };
            
            // Auch hier: Sicherheits-Säuberung für Firebase
            const safePlanData = JSON.parse(JSON.stringify(planData));
            await setDoc(doc(db, "planung", "wochenplan2026"), safePlanData, { merge: true });
            await window.trackEdit(); 

            const parts = selectedDayKey.split('-');
            const kwNum = parseInt(parts[1].replace('KW', ''));
            const dayName = parts[2];
            const dayIdx = daysFull.indexOf(dayName);

            let planDay = new Date(baseDate);
            planDay.setDate(baseDate.getDate() + ((kwNum - 3) * 7) + dayIdx);
            planDay.setHours(0, 0, 0, 0);

            const today = new Date();
            today.setHours(0, 0, 0, 0);

            if (planDay <= today && mealName !== "---") {
                await updateArchiveAutomatically(mealName, planDay, parts[1]);
            }
        };

        async function updateArchiveAutomatically(mealName, dateObj, kwLabel) {
            if (!mealName || mealName === "---") return;
            try {
                const archivRef = doc(db, "historie", "archiv");
                const ds = await getDoc(archivRef);
                let eintraege = ds.exists() ? (ds.data().eintraege || []) : [];
                const dateStr = dateObj.toLocaleDateString('de-DE');
                const exists = eintraege.some(e => e.date === dateStr && e.text.includes(mealName));
                
                if (!exists) {
                    eintraege.push({
                        woche: kwLabel,
                        text: `<b>Automatisch:</b> ${mealName}`,
                        timestamp: dateObj.getTime(),
                        date: dateStr
                    });
                    eintraege.sort((a, b) => b.timestamp - a.timestamp);
                    await setDoc(archivRef, { eintraege });
                }
            } catch (e) { console.error("Fehler im Auto-Archiv:", e); }
        }

        // --- ZUTATEN EDITOR LOGIK ---
        let currentRecipeId = null;

        window.addZutatRow = (menge = "", einheit = "", name = "") => {
            const container = document.getElementById('zutatenEditorContainer');
            const row = document.createElement('div');
            row.className = 'zutat-row';
            row.innerHTML = `
                <input type="number" step="any" placeholder="Menge" value="${menge}" class="z-menge">
                <input type="text" placeholder="Einh." value="${einheit}" class="z-einheit">
                <input type="text" placeholder="Zutat" value="${name}" class="z-name">
                <button onclick="this.parentElement.remove()" class="z-del">×</button>
            `;
            container.appendChild(row);
        };

        window.openRecipePopup = async (mealId, mealName) => {
            currentRecipeId = mealId;
            document.getElementById('editRecipeTitle').value = mealName;
            const modal = document.getElementById('recipeModal');
            document.getElementById('recipeTitle').innerText = mealName;
            modal.style.display = "flex";
            document.getElementById('viewZutaten').innerHTML = "<li>Lade...</li>";
            document.getElementById('viewZubereitung').innerText = "Lade...";
            document.getElementById('zutatenEditorContainer').innerHTML = "";
            document.getElementById('editRecipeTitle').value = mealName; 
            
            const tagContainer = document.getElementById('editTagsContainer');
            tagContainer.innerHTML = "";
            
            const mealData = speisekammerData.find(m => m.id === mealId);
            const currentTags = mealData && mealData.tags ? mealData.tags : [];

            const viewTagsContainer = document.getElementById('recipeViewTags');
            if (viewTagsContainer) {
                viewTagsContainer.innerHTML = currentTags.map(tagKey => {
                    const tag = TAGS[tagKey];
                    return tag ? `<span title="${tag.label}">${tag.icon}</span>` : '';
                }).join('');
            }
            
            Object.keys(TAGS).forEach(key => {
                const checked = currentTags.includes(key) ? 'checked' : '';
                tagContainer.innerHTML += `
                    <label title="${TAGS[key].label}" class="tag-edit-label">
                        <input type="checkbox" value="${key}" ${checked} class="tag-checkbox"> 
                        <span class="tag-icon-display" style="font-size:1.3rem; filter: ${checked ? 'grayscale(0)' : 'grayscale(1)'}; opacity: ${checked ? '1' : '0.4'};">
                            ${TAGS[key].icon}
                        </span>
                    </label>
                `;
            });

            document.querySelectorAll('.tag-checkbox').forEach(checkbox => {
                checkbox.addEventListener('change', (e) => {
                    const iconSpan = e.target.nextElementSibling;
                    const isChecked = e.target.checked;
                    iconSpan.style.filter = isChecked ? 'grayscale(0)' : 'grayscale(1)';
                    iconSpan.style.opacity = isChecked ? '1' : '0.4';
                });
            });

            try {
                const res = await getDoc(doc(db, "rezepte", mealId));
                const defaultText = "Arbeitszeit: XX min | Schwierigkeit: ★☆☆\n\n"; 

                if (res.exists()) {
                    const data = res.data();
                    
                    if (Array.isArray(data.zutaten)) {
                        document.getElementById('viewZutaten').innerHTML = data.zutaten.map(z => `<li>${z.menge || ''} ${z.einheit || ''} ${z.name}</li>`).join('');
                        data.zutaten.forEach(z => window.addZutatRow(z.menge, z.einheit, z.name));
                    }

                    const zubereitungInDB = data.zubereitung && data.zubereitung.trim() !== "" ? data.zubereitung : defaultText;
                    
                    document.getElementById('viewZubereitung').innerText = zubereitungInDB;
                    document.getElementById('editZubereitung').value = zubereitungInDB;

                } else {
                    document.getElementById('viewZutaten').innerHTML = "<li>Noch keine Zutaten.</li>";
                    document.getElementById('viewZubereitung').innerText = defaultText;

            const oldMealObj = speisekammerData.find(m => m.id === currentRecipeId);
            const oldName = oldMealObj ? oldMealObj.name : null;

            if (oldName && oldName !== newName) {
                let planChanged = false;
                Object.keys(planData).forEach(key => {
                    const data = planData[key];
                    // Fall 1: Ganz altes Text-Format
                    if (data === oldName) {
                        planData[key] = { mealId: currentRecipeId, meal: newName, chef: null };
                        planChanged = true;
                    } 
                    // Fall 2: Objekt-Format
                    else if (data && typeof data === 'object') {
                        if (data.meal === oldName || data.mealId === currentRecipeId) {
                            planData[key] = {
                                mealId: currentRecipeId,
                                meal: newName,
                                chef: data.chef || null
                            };
                            planChanged = true;
                        }
                    }
                });

                if (planChanged) {

        // --- EINKAUFSLISTEN LOGIK ---
        let activeShopFilter = 'all'; 

        window.generateShoppingList = async (filterChef = null, isSilent = false) => {
            activeShopFilter = filterChef || 'all';

            const filterSuffix = filterChef ? `-${filterChef}` : '-all';
            const shoppingListId = `list-2026-${currentKW.replace(' ', '')}${filterSuffix}`;
            let consolidated = {};
            const weekMeals = [];

            let listType = "Gesamtliste";
            if (filterChef === 'J') listType = "Liste für Julia";
            if (filterChef === 'H') listType = "Liste für Hendrik";

            // 1. Gerichte sammeln (in generateShoppingList)
            daysFull.forEach(day => {
                const key = `2026-KW${kwNum}-${day}`;
                const data = planData[key];

                    let mName = (typeof data === 'object') ? data.meal : data;
                    let mChef = (typeof data === 'object') ? data.chef : null;
                    
                    if (!mId && mName && mName !== "---") {
                        const found = speisekammerData.find(m => m.name === mName);
                        if (found) mId = found.id;
                    }

                    if (mId) {
                        if (filterChef && mChef !== filterChef) return;

            // 2. Button-Styling anpassen
            document.querySelectorAll('.shop-filter-btn').forEach(btn => {

            const activeBtn = document.getElementById(`btn-shop-${activeShopFilter}`);

            // 3. Zutatensammlung
            if (weekMeals.length > 0) {

                    const existingDocRef = doc(db, "einkaufslisten", shoppingListId);

                    if (existingDocSnap.exists() && Array.isArray(existingDocSnap.data().items)) {

                            existingItems[key] = item.checked;

                    console.warn("Konnte vorherigen Listenstatus nicht laden.", e);
                }

                for (const meal of weekMeals) { 
                    const res = await getDoc(doc(db, "rezepte", meal.id));
                    if (res.exists() && Array.isArray(res.data().zutaten)) {
                        res.data().zutaten.forEach(z => {
                            
                            // --- NEU: Gewürz-Filter (1g) ---
                            // Wir wandeln die Menge in eine Zahl um und die Einheit in Kleinbuchstaben
                            const mengeVal = parseFloat(z.menge || 0);
                            const einheitVal = (z.einheit || "").trim().toLowerCase();

                            if (mengeVal === 1 && einheitVal === "g") {
                                return; // Überspringt diese Zutat (sie landet nicht in 'consolidated')
                            }
                            // --------------------------------

                            const key = activeShopFilter === 'all'

                                : `${meal.name}_${z.name.trim().toLowerCase()}_${z.einheit.trim().toLowerCase()}`;

                            if (!consolidated[key]) {
                                const isChecked = existingItems[key] === true;
                                consolidated[key] = { 
                                    name: z.name, 
                                    menge: 0, 
                                    einheit: z.einheit, 
                                    checked: isChecked,
                                    mealName: activeShopFilter === 'all' ? null : meal.name 
                                };
                            }
                            consolidated[key].menge += parseFloat(z.menge || 0);
                        });
                    }
                }
            }

            // NEU: Bevor wir speichern, sortieren wir die Liste vor (Gericht alphabetisch, dann Status)
            let itemsArray = Object.values(consolidated);
            itemsArray.sort((a, b) => {
                if (a.mealName && b.mealName) {
                    if (a.mealName === b.mealName) return a.checked - b.checked;
                    return a.mealName.localeCompare(b.mealName);
                }
                return a.checked - b.checked;
            });

            // 4. In Firebase speichern
            await setDoc(doc(db, "einkaufslisten", shoppingListId), {

            });

            } else {
                console.log(`Shoppingliste (${listType}) im Hintergrund aktualisiert.`);
            }
        };

        // --- VERBRAUCHSSTOFFE LOGIK (Korrigiert & Optimiert) ---

        // Globale Variable, um die Firebase-Subscription zu halten.
        let consumablesUnsubscribe = null; 
        // Globale Variable, um den Ladezustand zu verfolgen.
        let isInitialConsumablesLoad = true;

        // Diese Funktion öffnet das Popup und startet die Live-Synchronisation.
        window.showConsumablesModal = () => {
            const modal = document.getElementById('consumablesModal');
            const listContainer = document.getElementById('consumablesListContainer');
            
            modal.style.display = 'flex';
            listContainer.innerHTML = "<p>Lade...</p>";

            // Setzt den Ladezustand zurück, wenn das Modal geöffnet wird.
            isInitialConsumablesLoad = true;

            // Beendet eine alte Subscription, falls eine existiert, um doppelte Listener zu vermeiden.
            if (consumablesUnsubscribe) {
                consumablesUnsubscribe();
            }

            // Baut die Verbindung zur "verbrauchsstoffe"-Sammlung in Firebase auf.
            const consumablesCollection = collection(db, "verbrauchsstoffe");
            const consumablesQuery = query(consumablesCollection, orderBy("createdAt", "asc"));

            // onSnapshot startet die Live-Beobachtung.
            // Dieser Code wird bei JEDER Änderung in der Datenbank (hinzufügen, löschen) automatisch ausgeführt.
            consumablesUnsubscribe = onSnapshot(consumablesQuery, (snapshot) => {
                
                // Verhindert, dass der rote Punkt beim ersten Laden angezeigt wird.
                if (isInitialConsumablesLoad) {
                    isInitialConsumablesLoad = false;
                }
                // Der direkte Aufruf von showNotificationDot() wurde hier entfernt.

                listContainer.innerHTML = ""; // Leert die Liste für die Neuzeichnung.

                if (snapshot.empty) {
                    listContainer.innerHTML = "<p style='text-align:center; color: #94a3b8;'>Noch keine Einträge.</p>";
                    return;
                }
                
                // Geht jeden Eintrag aus der Datenbank durch und erstellt das HTML.
                snapshot.forEach((doc) => {
                    const item = doc.data();
                    const itemId = doc.id;
                    
                    const itemElement = document.createElement('div');
                    itemElement.className = 'consumable-item';
                    itemElement.innerHTML = `
                        <span>${item.name}</span>
                        <button class="consumable-item-delete-btn" onclick="window.deleteConsumableItem('${itemId}')">×</button>
                    `;
                    listContainer.appendChild(itemElement);
                });
            });
        };

        // Schließt das Modal und BEENDET die Live-Verbindung, um Ressourcen zu sparen.
        window.closeConsumablesModal = () => {
            const modal = document.getElementById('consumablesModal');
            modal.style.display = 'none';
            
            // WICHTIG: Die Live-Verbindung wird hier getrennt.
            if (consumablesUnsubscribe) {
                consumablesUnsubscribe();
                consumablesUnsubscribe = null;
            }
        };

        // Fügt einen neuen Eintrag hinzu. onSnapshot kümmert sich automatisch um die Aktualisierung der Ansicht.
        window.addConsumableItem = async () => {

            const itemName = input.value.trim();

            if (itemName) {
                try {
                    await addDoc(collection(db, "verbrauchsstoffe"), {
                        name: itemName,
                        createdAt: Date.now()
                    });
                    input.value = ""; // Eingabefeld leeren
                    await window.trackEdit(); // NEU: Bearbeitung protokollieren
                } catch (error) {
                    console.error("Fehler beim Hinzufügen des Verbrauchsstoffes: ", error);
                    alert("Konnte den Eintrag nicht hinzufügen.");
                }
            }
        };

        // --- VERBESSERTE LÖSCHFUNKTION ---
        // Diese Version ist robuster und vermeidet Probleme mit dem confirm-Dialog.

                window.deleteConsumableItem = async (itemId) => {
            // Findet den Button und das zugehörige Item-Element im HTML
            const button = event.target;
            const itemElement = button.closest('.consumable-item');

            // 1. UI SOFORT AKTUALISIEREN (Optimistic UI Update)
            if (itemElement) {
                itemElement.style.transition = 'opacity 0.3s ease-out';
                itemElement.style.opacity = '0';
            }

            // 2. LÖSCHEN IN DER DATENBANK ANSTOSSEN (im Hintergrund)
            try {
                // Das eigentliche Löschen in Firebase.
                await deleteDoc(doc(db, "verbrauchsstoffe", itemId));
                await window.trackEdit(); // NEU: Bearbeitung protokollieren
                
                // onSnapshot wird diese Änderung im Hintergrund bemerken und den Datenstand
                // offiziell synchronisieren, aber für den Nutzer ist das Item bereits weg.

            } catch (error) {
                console.error("Fehler beim Löschen des Eintrags: ", error);
                alert("Konnte den Eintrag nicht löschen. Die Liste wird neu geladen.");
                
                // 3. IM FEHLERFALL: UI ZURÜCKSETZEN
                if (itemElement) {
                    itemElement.style.opacity = '1';
                }
            }
        };

        let listUnsubscribe = null;

        window.showShoppingList = () => {
            const currentKW = kwLabels[currentWeekIndex];

            // Das Mapping ist weiterhin super und bleibt erhalten.
            const filterAnzeigeNamen = {
                'all': 'Alle',
                'J': 'Julia',
                'H': 'Hendrik'
            };
            
            // Die ID-Generierung ist auch korrekt.
            const filterSuffix = activeShopFilter === 'all' ? '-all' : `-${activeShopFilter}`;

            modal.style.display = "flex";

                if (!ds.exists()) {
                    
                    const docId = ds.ref.id; // z.B. "list-2026-KW10-J" oder "list-2026-KW10-all"

                            </button>

                const items = ds.data().items;
                let currentMeal = null;

                items.forEach((item, index) => {

                    if (item.mealName && item.mealName !== currentMeal) {
                        html += `<h4 style="margin: 20px 0 8px 0; color: var(--primary); border-bottom: 2px solid #f1f5f9; padding-bottom: 4px;">${item.mealName}</h4>`;
                        currentMeal = item.mealName;

                    html += `

                                onchange="window.toggleListItem('${shoppingListId}', ${index})">

                                <strong>${item.menge > 0 ? item.menge : ''} ${item.einheit}</strong> ${item.name}

                    `;

                content.innerHTML = html;

        window.toggleListItem = async (listId, index) => {
            const docRef = doc(db, "einkaufslisten", listId);
            const ds = await getDoc(docRef);
            if (ds.exists()) {
                const items = ds.data().items;
                // Schritt 1: Der Status des angeklickten Elements wird wie bisher umgeschaltet.
                items[index].checked = !items[index].checked;

                // Schritt 2 (NEU): Die gesamte Liste wird neu sortiert.
                // Wenn es nach Gerichten gegliedert ist, sortieren wir zuerst nach Gericht, DANN nach Checkbox.
                items.sort((a, b) => {
                    if (a.mealName && b.mealName) {
                        if (a.mealName === b.mealName) {
                            return a.checked - b.checked; // Innerhalb des Gerichts abgehaktes nach unten
                        }
                        return a.mealName.localeCompare(b.mealName); // Gerichte zusammenhalten
                    }
                    return a.checked - b.checked; // Fallback für die "Alle" Liste
                });

                // Schritt 3: Die neu sortierte Liste wird in der Datenbank gespeichert.
                await setDoc(docRef, { items: items }, { merge: true });
            }
        };

        // --- SONSTIGE FUNKTIONEN ---
        window.setChef = async (key, chefLetter, event) => {
            event.stopPropagation();
            if (!isEditMode) return;
            const currentData = planData[key] || {};
            
            // Wir greifen die alten Daten sicher ab, falls vorhanden
            const currentMealId = (typeof currentData === 'object' && currentData.mealId) ? currentData.mealId : null;
            const currentMealName = (typeof currentData === 'object' && currentData.meal) ? currentData.meal : (typeof currentData === 'string' ? currentData : "---");
            const currentChef = (typeof currentData === 'object') ? currentData.chef : null;
            
            const newChef = (currentChef === chefLetter) ? null : chefLetter;
            
            planData[key] = { 
                mealId: currentMealId || null,
                meal: currentMealName || "---", 
                chef: newChef || null 
            };

            // WICHTIG: Firebase stürzt bei 'undefined' ab. Das säubert alle ungültigen Daten:
            const safePlanData = JSON.parse(JSON.stringify(planData));
            await setDoc(doc(db, "planung", "wochenplan2026"), safePlanData, { merge: true });
            await window.trackEdit(); 
        };

        window.selectDay = (key) => {

                const currentData = planData[key];
                let mealId = (currentData && typeof currentData === 'object') ? currentData.mealId : null;
                let mealName = (currentData && typeof currentData === 'object') ? currentData.meal : currentData;

                if (!mealId && mealName && mealName !== "---") {

            const searchTerm = document.getElementById('mealSearch').value.toLowerCase();
            const meals = document.querySelectorAll('.meal-item');
            
            meals.forEach(meal => {
                if (meal.classList.contains('add-meal-btn')) return;

                const nameEl = meal.querySelector('span');
                const name = nameEl ? nameEl.innerText.toLowerCase() : "";

                const tagsAttr = meal.getAttribute('data-tags') || "";
                const mealTags = tagsAttr.split(',').map(t => t.trim()).filter(t => t !== "");

                const matchText = name.includes(searchTerm);
                
                let matchTag = true;
                if (activeTagFilters.length > 0) {
                    matchTag = activeTagFilters.every(f => mealTags.includes(f));

                if (matchText && matchTag) {
                    meal.style.display = "flex";

            });

            if (index < 0) index = 0; if (index > 51) index = 51;

            Array.from(contentDiv.children).forEach(child => {

                        <div class="chef-selector">
                            <button onclick="setChef('${key}', 'J', event)" class="btn-j">J</button>
                            <button onclick="setChef('${key}', 'H', event)" class="btn-h">H</button>
                        </div>
                        <div class="day-info-col">
                            <div class="day-name">${day}</div>
                            <div class="day-date">${ds}</div>
                        </div>
                        <div class="meal-col"><div class="selected-meal" id="text-${key}">---</div></div>
                    </div>`;
                });
                weekPage.appendChild(grid);
                wrapper.appendChild(weekPage);
            }
            
            currentWeekIndex = getInitialWeekIndex();
            document.getElementById('weekWrapper').style.transform = `translateX(-${currentWeekIndex * 100}%)`;
            updateKWDisplay();
        }
        window.onload = init;

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker registriert!', reg))
                    .catch(err => console.log('Service Worker Fehler:', err));
            });
        }
    </script>
    <style>

        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(18px); }
        .controls-wrapper { display: flex; align-items: center; gap: 10px; background: white; padding: 10px 20px; border-radius: 50px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; position: sticky; top: 60px; z-index: 90; transition: all 0.3s ease; }

        .day-card.is-today.chef-h { border-color: var(--hendrik) !important; }

            animation: pin-bounce 1.5s ease-in-out 2 forwards;
            transform-origin: bottom center;
        }
        
        @keyframes pin-bounce {
            0%, 100% { transform: translateY(0) rotate(0); }

        .day-date { color: var(--primary); font-weight: 600; font-size: 0.85rem; }

        .meal-item { background: #f8fafc; padding: 10px; border-radius: 10px; text-align: center; cursor: pointer; border: 2px solid transparent; font-size: 0.8rem; font-weight: 500; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: transform 0.2s; }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-box { background: white; padding: 15px; border-radius: 24px; width: 90%; max-width: 500px; height: 96vh; overflow-y: auto; transition: background 0.3s ease;}
        .recipe-box strong { display: block; margin-top: 10px; color: var(--primary); text-transform: uppercase; font-size: 0.75rem; }

        /* RESPONSIVE MEDIA QUERIES */
        @media (max-width: 600px) { 
            .week-grid { grid-template-columns: 1fr; }

        @media (min-width: 1024px) { 
            .desktop-layout { display: flex; flex-direction: row; gap: 20px; width: 100%; align-items: flex-start; box-sizing: border-box; }

            #btn-verbrauch-desktop {width: 100%; margin-top: 20px;}

    </style>
